x-backend-defaults: &backend-defaults
  image: frappe/erpnext:version-15
  restart: unless-stopped
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - apps:/home/frappe/frappe-bench/apps
  platform: linux/amd64
  environment:
    # الطريقة الرسمية والأسرع: الحاوية وهي بتقوم بتثبت الـ hrms في ثواني معدودة جوة الـ Env الخاص بيها
    INSTALL_APPS: hrms
    PIP_PACKAGES: "git+https://github.com/frappe/hrms.git@version-15"
  depends_on:
    configurator:
      condition: service_completed_successfully

services:
  db:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - db-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data
    expose:
      - "6379"

  redis-queue:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    expose:
      - "6379"

  configurator:
    image: frappe/erpnext:version-15
    restart: "no"
    platform: linux/amd64
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    entrypoint: [bash, -c]
    command:
      - >
        if [ ! -d "apps/hrms" ]; then
          bench get-app hrms --branch version-15;
        fi;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    depends_on:
      db:
        condition: service_healthy

  backend:
    <<: *backend-defaults
    expose:
      - "8000"

  websocket:
    <<: *backend-defaults
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]
    expose:
      - "9000"

  queue-short:
    <<: *backend-defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend-defaults
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend-defaults
    command: bench schedule

  frontend:
    image: frappe/erpnext:version-15
    restart: unless-stopped
    platform: linux/amd64
    command: [nginx-entrypoint.sh]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: 'erp.raqqm.com'
      UPSTREAM_REAL_IP_ADDRESS: '127.0.0.1'
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: 'off'
      PROXY_READ_TIMEOUT: '120'
      CLIENT_MAX_BODY_SIZE: '50m'
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    expose:
      - "8080"
    depends_on:
      - backend
      - websocket
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`erp.raqqm.com`)"
      - "traefik.http.routers.erpnext.entrypoints=http,https"
      - "traefik.http.routers.erpnext.tls=true"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8080"

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  sites:
  apps:
